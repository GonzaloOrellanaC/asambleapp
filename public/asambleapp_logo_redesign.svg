<svg id="customizableLogo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 100" class="w-full h-auto drop-shadow-[0_4px_12px_rgba(15,23,42,0.03)]">
                                <defs>
                                    <linearGradient id="custBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" id="custStopBlueStart" stop-color="#2563eb"></stop>
                                        <stop offset="100%" id="custStopBlueEnd" stop-color="#0030b8"></stop>
                                    </linearGradient>
                                    <linearGradient id="custPurpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" id="custStopPurpleStart" stop-color="#6366f1"></stop>
                                        <stop offset="100%" id="custStopPurpleEnd" stop-color="#3033be"></stop>
                                    </linearGradient>
                                    <linearGradient id="custCyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" id="custStopCyanStart" stop-color="#06b6d4"></stop>
                                        <stop offset="100%" id="custStopCyanEnd" stop-color="#2cdcfa"></stop>
                                    </linearGradient>
                                </defs>
                                
                                <!-- Isotype Group scaled slightly -->
                                <g transform="translate(15, 10) scale(0.8)">
                                    <path d="M 22 80 C 22 80, 24 55, 38 43 C 43 38, 48 30, 50 18 C 50 18, 44 40, 34 52 C 28 60, 31 80, 31 80 Z" fill="url(#custBlueGrad)"></path>
                                    <path d="M 78 80 C 78 80, 76 55, 62 43 C 57 38, 52 30, 50 18 C 50 18, 56 40, 66 52 C 72 60, 69 80, 69 80 Z" fill="url(#custPurpleGrad)"></path>
                                    <path d="M 28 62 C 38 56, 62 56, 72 62 C 70 66, 30 66, 28 62 Z" fill="url(#custCyanGrad)" opacity="0.9"></path>
                                    <circle cx="50" cy="11" r="3.5" id="nodeCircle1" fill="#06b6d4"></circle>
                                    <circle cx="34" cy="20" r="3" id="nodeCircle2" fill="#009dbb"></circle>
                                    <circle cx="66" cy="20" r="3" id="nodeCircle3" fill="#6366f1"></circle>
                                    <circle cx="21" cy="35" r="2.5" id="nodeCircle4" fill="#2563eb"></circle>
                                    <circle cx="79" cy="35" r="2.5" id="nodeCircle5" fill="#7d80ff"></circle>
                                </g>

                                <!-- Text logo with Dynamic customized Text content -->
                                <text x="100" y="60" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-weight="800" font-size="32" id="custTextElement" fill="#0f172a" letter-spacing="-1px">asamble<tspan id="custTextSpan" fill="#2563eb">app</tspan></text>
                            </svg>